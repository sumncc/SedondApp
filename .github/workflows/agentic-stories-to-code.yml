name: Agentic SDLC - Stories to Code

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      slug: { required: true }
      input_path: { required: false, default: docs/generated/stories }
      target_branch: { required: false, default: develop }
      config_path: { required: false, default: .github/agent-prompts/config.yml }
      prompt_path: { required: false, default: .github/agent-prompts/generate_code.md }

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-code:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == 'develop')
    runs-on: ubuntu-latest
    concurrency:
      group: stories-code-${{ github.event.pull_request.number || github.run_id }}-${{ github.event.inputs.slug || 'auto' }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: develop, fetch-depth: 0 }
      - id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: docs/generated/stories/**
      - if: github.event_name != 'workflow_dispatch' && steps.changed.outputs.any_changed != 'true'
        run: echo "No stories changes detected."
      - uses: actions/setup-java@v4
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.any_changed == 'true'
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-python@v5
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.any_changed == 'true'
        with: { python-version: '3.11' }
      - if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.any_changed == 'true'
        run: pip install pyyaml
      - id: slug
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.any_changed == 'true'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.slug }}" >> $GITHUB_OUTPUT
          else
            echo "value=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi
      - name: Generate code from READY stories
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.any_changed == 'true'
        run: |
          chmod +x .github/scripts/*
          .github/scripts/generate_code "${{ github.event.inputs.input_path || 'docs/generated/stories' }}" "${{ steps.slug.outputs.value }}" "${{ github.event.pull_request.number || 0 }}" "${{ github.head_ref || 'manual' }}" "src/main/java" "${{ github.event.inputs.config_path || '.github/agent-prompts/config.yml' }}" "${{ github.event.inputs.prompt_path || '.github/agent-prompts/generate_code.md' }}"
      - name: Build and tests
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.any_changed == 'true'
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew clean test || true
            ./gradlew integrationTest || true
          else
            echo "No gradlew found; skipping build/test commands."
          fi
      - name: Optional security checks
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.any_changed == 'true'
        run: |
          echo "SonarQube/BlackDuck/OWASP checks should be wired according to project setup."
      - uses: peter-evans/create-pull-request@v7
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.any_changed == 'true'
        with:
          branch: auto/code/${{ steps.slug.outputs.value }}
          base: develop
          title: feat':' ${{ steps.slug.outputs.value }}
          commit-message: "feat: generate code for ${{ steps.slug.outputs.value }}"
          body: |
            Source PR link: ${{ github.event.pull_request.html_url || 'manual-run' }}
            Changed paths detected: ${{ steps.changed.outputs.all_changed_files || github.event.inputs.input_path }}
            Generated files list: src/**, src/test/**, src/integrationTest/**
            Validation summary: build/tests executed (best effort)
            Traceability summary: STORY -> SRC
            Skipped files and reasons: non-READY stories skipped by filename filter